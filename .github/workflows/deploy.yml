name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'pisangdb'
        type: choice
        options:
          - pisangdb
          - staging
      deploy_database:
        description: 'Deploy database containers?'
        required: false
        default: false
        type: boolean
      skip_build:
        description: 'Skip build and use existing image?'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DEPLOY_DIR: /home/rio/apps/pisangdb

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.inputs.skip_build != 'true' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=${{ github.ref_name }}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: build
    if: needs.build.result == 'success' || github.event.inputs.skip_build == 'true'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'pisangdb' }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "${{ env.DEPLOY_DIR }}"

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            ENV="${{ github.event.inputs.environment || 'pisangdb' }}"
            DEPLOY_DB="${{ github.event.inputs.deploy_database }}"
            IS_MANUAL="${{ github.event_name == 'workflow_dispatch' }}"
            DEPLOY_DIR="${{ env.DEPLOY_DIR }}"
            
            echo "🚀 Starting deployment to $ENV..."
            [ "$IS_MANUAL" == "true" ] && echo "📋 Manual deployment triggered"
            
            # Create app directory if not exists
            mkdir -p $DEPLOY_DIR
            cd $DEPLOY_DIR

            # Create data directories for containers (bind mounts)
            mkdir -p ./postgres-app
            mkdir -p ./postgres-sandbox
            mkdir -p ./mysql
            mkdir -p ./mariadb

            # Ensure integrate network exists (for Caddy connectivity)
            docker network inspect integrate >/dev/null 2>&1 || docker network create integrate
            echo "✅ Network 'integrate' ready"

            # Create .env file for docker compose
            echo "🔧 Creating environment file..."
            cat > .env << 'ENV_EOF'
            APP_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            BUILD_TIMESTAMP=${{ github.run_id }}-${{ github.run_attempt }}
            NETWORK_EXTERNAL=true
            PG_APP_PASSWORD=${{ secrets.PG_APP_PASSWORD }}
            PG_SANDBOX_PASSWORD=${{ secrets.PG_SANDBOX_PASSWORD }}
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            MARIADB_ROOT_PASSWORD=${{ secrets.MARIADB_ROOT_PASSWORD }}
            BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}
            BETTER_AUTH_URL=${{ secrets.BETTER_AUTH_URL }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
            OPENROUTER_MODEL=${{ secrets.OPENROUTER_MODEL }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
            SMTP_FROM=${{ secrets.SMTP_FROM }}
            ENV_EOF

            # Deploy database if selected (manual only)
            if [ "$DEPLOY_DB" == "true" ]; then
              echo "🗄️ Deploying database containers..."
              docker compose pull postgres-app postgres-sandbox mysql mariadb
              docker compose up -d postgres-app postgres-sandbox mysql mariadb
              echo "⏳ Waiting for databases to be ready..."
              sleep 10
            fi

            # Run database migrations using drizzle-kit
            echo "Running database migrations..."
            docker run --rm --network=integrate -v "$PWD/drizzle.config.ts:/app/drizzle.config.ts" -v "$PWD/src/db:/app/src/db" -e DATABASE_URL="postgresql://pisang:${PG_APP_PASSWORD}@postgres-app:5432/pisangdb" node:22-alpine sh -c "corepack enable && pnpm install drizzle-kit@0.31.9 && npx drizzle-kit push" 2>/dev/null || echo "Migration may have already been applied"

            # Deploy app
            echo "📦 Deploying application..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull app
            docker compose up -d --force-recreate --remove-orphans app
            docker logout ghcr.io

            # Cleanup old images
            echo "🧹 Cleaning up..."
            docker image prune -f

            # Health check (with timeout)
            echo "🏥 Health check..."
            for i in {1..12}; do
              if curl -s http://localhost:3000/api/health > /dev/null 2>&1; then
                echo "✅ Application is healthy!"
                break
              fi
              if [ $i -eq 12 ]; then
                echo "⚠️ Health check failed after 60s"
                docker compose logs --tail=50 app
                exit 1
              fi
              echo "⏳ Attempt $i/12..."
              sleep 5
            done

            echo ""
            echo "🍌 Deployment to $ENV completed!"
            echo "   App: http://localhost:3000"
            echo "   Logs: docker compose logs -f app"
            echo "   Data: $DEPLOY_DIR/"

  notify:
    name: Notify Status
    needs: deploy
    if: always() && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Deployment Status
        run: |
          ENV="${{ github.event.inputs.environment || 'pisangdb' }}"
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Deployment to $ENV successful!"
          else
            echo "❌ Deployment to $ENV failed!"
            exit 1
          fi
