name: CI

on:
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  check:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome check
        run: pnpm check

      - name: Run tests
        run: pnpm vitest run --exclude 'tests/e2e/**' --passWithNoTests

      - name: Build
        run: pnpm build
