# PisangDB Docker Compose Configuration
# Multi-engine support: PostgreSQL, MySQL, MariaDB
# See PRD §8.4 and §15.4 for architecture details

services:
  # ===========================================
  # Application Database (metadata, users, etc.)
  # ===========================================
  postgres-app:
    image: postgres:16
    container_name: pisangdb-postgres-app
    restart: unless-stopped
    environment:
      POSTGRES_DB: pisangdb
      POSTGRES_USER: pisang
      POSTGRES_PASSWORD: ${PG_PASSWORD:-pisangdev}
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pisang -d pisangdb"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 768M
        reservations:
          memory: 256M
    networks:
      - pisangdb-network

  # ===========================================
  # Sandbox Database (ephemeral user databases)
  # This container provisions isolated databases
  # ===========================================
  postgres-sandbox:
    image: postgres:16
    container_name: pisangdb-postgres-sandbox
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${PG_SANDBOX_PASSWORD:-pisangdev}
    ports:
      - "5433:5432"
    volumes:
      - pgsandbox:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 768M
        reservations:
          memory: 256M
    networks:
      - pisangdb-network

  # ===========================================
  # MySQL Sandbox (ephemeral user databases)
  # ===========================================
  mysql-sandbox:
    image: mysql:8-oracle
    container_name: pisangdb-mysql-sandbox
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-mysqlrootdev}
    ports:
      - "3306:3306"
    volumes:
      - mysqlsandbox:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: --default-authentication-plugin=mysql_native_password
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - pisangdb-network

  # ===========================================
  # MariaDB Sandbox (ephemeral user databases)
  # ===========================================
  mariadb-sandbox:
    image: mariadb:11
    container_name: pisangdb-mariadb-sandbox
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-mariadbrootdev}
    ports:
      - "3307:3306"
    volumes:
      - mariadbsandbox:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 200M
    networks:
      - pisangdb-network

  # ===========================================
  # PisangDB Application (TanStack Start)
  # ===========================================
  app:
    build:
      context: .
      target: dev
    container_name: pisangdb-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # App database connection (metadata)
      DATABASE_URL: postgresql://pisang:${PG_PASSWORD:-pisangdev}@postgres-app:5432/pisangdb
      # Sandbox database connections (for provisioning)
      POSTGRES_SANDBOX_URL: postgresql://postgres:${PG_SANDBOX_PASSWORD:-pisangdev}@postgres-sandbox:5432/postgres
      MYSQL_SANDBOX_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-mysqlrootdev}@mysql-sandbox:3306
      MARIADB_SANDBOX_URL: mysql://root:${MARIADB_ROOT_PASSWORD:-mariadbrootdev}@mariadb-sandbox:3306
      # Gemini AI API key (optional)
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # JWT secret for auth
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      # Node environment
      NODE_ENV: ${NODE_ENV:-development}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.vinxi
    depends_on:
      postgres-app:
        condition: service_healthy
      postgres-sandbox:
        condition: service_healthy
      mysql-sandbox:
        condition: service_healthy
      mariadb-sandbox:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - pisangdb-network
    command: pnpm dev

# ===========================================
# Named Volumes (persistent data)
# ===========================================
volumes:
  pgdata:
    name: pisangdb-pgdata
  pgsandbox:
    name:香蕉db-pgsandbox
  mysqlsandbox:
    name:pisangdb-mysqlsandbox
  mariadbsandbox:
    name:pisangdb-mariadbsandbox

# ===========================================
# Network (inter-service communication)
# ===========================================
networks:
  pisangdb-network:
    name: pisangdb-network
    driver: bridge